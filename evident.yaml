version: 0.1
project: proteon-pyg
description: >
  EVIDENT claim manifest for the proteon-pyg integration adapter.
  Conforms to the EVIDENT workflow contract (claim -> trust strategy ->
  oracle -> tolerance -> command -> artifact -> assumptions + failure modes)
  defined at github.com/theGreatHerrLebert/evident.

claims:
  - id: proteon-pyg-residue-feature-parity
    title: PyG Data tensor values equal direct proteon API outputs
    case: CASE.md
    source: src
    tier: ci
    trust_strategy:
      - validation
    claim: >
      For every residue in the structure-derived PyG Data, the values
      attached as tensors are exactly equal (post .numpy() round-trip) to
      what proteon returns when called directly on the same PDB. Coverage:
      residue_sasa, rsa, dssp (8-state int codes 0..7 with -1 sentinel
      for non-AA), hbond_count (-1 sentinel for non-AA), phi/psi/omega
      (NaN at chain termini and non-AA residues), and the
      proteon_energy_<component> graph-level tensors. The adapter must
      not lose, reorder, round, or rebadge values during the dict ->
      tensor transcription.
    evidence:
      oracle:
        - proteon (direct compute_proteon_features call, same process)
      tolerance: >
        Exact equality for floats (SASA, RSA, dihedrals, energy components)
        post .numpy() round-trip; integer equality for DSSP int codes and
        hbond_count; NaN-aware for RSA on non-standard residues and for
        phi/psi/omega at chain termini (NaN must remain NaN at the same
        indices).
      command: >
        /scratch/TMAlign/proteon/.venv/bin/python -m pytest
        tests/test_parity.py -v
      artifact: pytest exit code and captured failure diffs (stdout)
    assumptions:
      - The adapter shares a process and proteon version with the oracle;
        proteon version skew is out of scope for this manifest.
      - torch and torch_geometric are installed when the parity test runs.
        When they are not, the test skips (matching the optional [pyg]
        extra) rather than passes silently -- pytest.importorskip surfaces
        the missing module, not a hidden zero-coverage path.
      - DSSP_CLASSES is the canonical 8-state alphabet that proteon's
        dssp() emits. Any character outside this alphabet decodes to '?'.
      - Test fixtures live at /scratch/TMAlign/proteon/test-pdbs/ and tests
        skip (not fail) when those files are missing.
    failure_modes:
      - proteon's dssp() output gains a 9th state symbol that
        encode_dssp/decode_dssp does not know about. Mitigation
        round-trip test (test_encode_dssp_round_trip) and DSSP_CLASSES
        is exported as a public constant so users can detect drift.
      - The order of residues iterated by structure.residues changes
        between proteon versions, decoupling tensor indices from the
        per-AA arrays returned by dssp() / hbond_count() /
        backbone_dihedrals(). Mitigation
        test_parity_residue_features_match_direct_proteon_call rebuilds
        the AA index from data.is_amino_acid before comparing.
      - NaN is silently coerced to 0.0 (or a real number) inside torch's
        from_numpy path, breaking the NaN-position parity. Mitigation
        explicit math.isnan checks at every dihedral index in the
        parity test.

  - id: proteon-pyg-atom-level-parity
    title: Atom-level Data tensors equal direct proteon per-atom outputs
    case: CASE.md
    source: src
    tier: ci
    trust_strategy:
      - validation
    claim: >
      For every atom in an atom-granularity proteon_pyg_data Data, the
      attached per-atom tensor values are exactly equal to what proteon
      returns when called directly: pos equals atom (x, y, z); atom_sasa
      equals proteon.atom_sasa(structure); charge / is_backbone / hetero
      equal Atom.charge / .is_backbone / .hetero; atom_name and element
      preserve their original strings; residue_index correctly maps each
      atom back to its residue index in structure.residues. Per-residue
      tensors at residue resolution remain parity-equal to the
      residue-only manifest claim.
    evidence:
      oracle:
        - proteon (direct atom_sasa + Atom API + residues iteration, same process)
      tolerance: >
        Exact equality for all per-atom tensors (post .numpy() round-trip);
        list equality for atom_name and element; integer equality for
        residue_index.
      command: >
        /scratch/TMAlign/proteon/.venv/bin/python -m pytest
        tests/test_parity.py::test_parity_atom_level_features_match_direct_proteon_call -v
      artifact: pytest exit code and captured failure diffs (stdout)
    assumptions:
      - structure.residues iteration order matches the flat order proteon's
        atom_sasa() and structure.atoms emit; the test re-derives the
        oracle via the same nested walk to guard against future drift.
      - alt-loc handling follows proteon's residue.atoms iterator which
        emits primary-conformer atoms only; this matches what proteon's
        single-call atom_sasa is built on.
    failure_modes:
      - residue.atoms iteration order changes between proteon versions,
        decoupling the (residue_index, atom-row) ordering from the
        atom_sasa flat array. Mitigation parity test re-derives the
        oracle via the same residues -> residue.atoms walk.
      - alt-loc atoms are surfaced inconsistently between atom_sasa and
        residue.atoms, producing length mismatches. Mitigation explicit
        length-check error in _build_atom_block before any par-iter writes.

  - id: proteon-pyg-batch-parity
    title: proteon_pyg_data_batch produces identical Data to a single-call loop
    case: CASE.md
    source: src
    tier: ci
    trust_strategy:
      - validation
    claim: >
      For any sequence of PDB paths, the Data objects returned by
      proteon_pyg_data_batch(paths) carry exactly the same attribute set
      and tensor values as those produced by [proteon_pyg_data(p) for p
      in paths]. Holds at both residue and atom granularity. Strict mode
      only -- one bad PDB raises and discards the batch.
    evidence:
      oracle:
        - proteon_pyg_data (single-call helper, same process)
      tolerance: >
        Exact equality for every tensor (float dtype: numpy round-trip;
        integer dtype: torch.equal; lists / strings: equality). The
        single-call helper is itself parity-tested against direct proteon
        API calls, so this claim is transitively a parity claim against
        proteon.
      command: >
        /scratch/TMAlign/proteon/.venv/bin/python -m pytest
        tests/test_parity.py::test_parity_batch_helper_matches_single_call_loop_residue
        tests/test_parity.py::test_parity_batch_helper_matches_single_call_loop_atom -v
      artifact: pytest exit code and captured failure diffs (stdout)
    assumptions:
      - proteon's batch primitives (batch_load, batch_residue_sasa,
        batch_relative_sasa, batch_atom_sasa, batch_dssp, batch_dihedrals,
        batch_hbond_count, batch_compute_energy) produce per-structure
        results identical to their single-call counterparts. proteon
        ships its own parity tests for this contract.
      - Strict mode only -- the batch helper does not yet support tolerant
        loading, so any failed PDB raises a Python exception rather than
        being skipped.
    failure_modes:
      - A future proteon batch primitive drifts from its single-call
        sibling in iteration order or rounding. Mitigation full
        attribute-set equality assertion in
        test_parity_batch_helper_matches_single_call_loop_*.
      - Dual-resolution Data (atom granularity carries both atom-level
        and residue-level tensors) silently loses one of the two blocks
        in the batch path. Mitigation the parity test runs at both
        granularities and asserts attribute-key set equality.

# Deferred claims are tracked separately so the validated manifest never
# carries placeholder evidence (Validation Theater anti-pattern). Each entry
# is promoted into `claims:` only once it has real oracle, tolerance, command,
# and artifact.
deferred_claims: []
